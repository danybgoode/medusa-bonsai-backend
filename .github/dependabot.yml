# Backend Production Readiness — Sprint 4, Story 4.3 (audit gap #13).
# Dependency/CVE scanning for the Medusa backend. GitHub-native, no build gate:
# Dependabot raises weekly dependency PRs and security PRs for known CVEs, so a
# vulnerable package is surfaced as a reviewable PR instead of shipping silently.
# (Chosen over a build-failing npm-audit/Trivy step so a transitive advisory never
# blocks an unrelated deploy — see the epic plan.)
version: 2
updates:
  # Medusa app dependencies (package.json at repo root).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Collapse the routine churn into one PR; security updates still come separately.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    ignore:
      # react-i18next >=17 requires i18next >=26.2.0 (its own peerDependencies), but @medusajs/dashboard
      # — the admin UI bundled INTO this backend's own build ("Compiling frontend source") — hard-pins
      # react-i18next to 13.5.0 + i18next to 23.7.11 as ITS OWN direct dependencies, even at the latest
      # stable @medusajs/dashboard (2.17.2, checked 2026-07-03). Bumping react-i18next here alone breaks
      # the admin build (`"keyFromSelector" is not exported by i18next`, confirmed live — PR #23).
      # Un-ignore once @medusajs/dashboard itself moves off react-i18next 13.5.0/i18next 23.7.11.
      - dependency-name: "react-i18next"
        versions: [">=14.0.0"]

  # Keep the CI/CD GitHub Actions (notify-telegram.yml) patched too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
