# YAML lint — semantic checks on GitHub Actions workflow files that a syntax-only YAML parser can't
# catch (bad `uses:` refs, invalid `needs:`, typo'd `${{ }}` context expressions, shellcheck on inline
# `run:` blocks). Deploy-critical cloudbuild.yaml + dependabot.yml correctness is a SEPARATE, stricter
# check — see src/lib/yaml-audit.ts + src/lib/__tests__/yaml-audit.unit.spec.ts, which ride the
# existing required `test:unit` gate.
#
# There is no official reusable "actionlint action" — actionlint's own docs (docs/usage.md) recommend
# downloading the release binary via its download script. The actionlint VERSION is pinned explicitly
# below (matching the frontend's identical yaml-guard.yml); the tiny download-script wrapper itself is
# fetched unpinned from the tool's own `main` branch (its documented, standard install method).
#
# REQUIRED — advisory cycle came back clean (actionlint found zero issues on the real workflow
# files; Daniel reviewed the run on all three repos and confirmed only GitHub's own informational
# Node-20-deprecation notice, unrelated to actionlint). Flipped to required 2026-07-16, one cycle
# after the guard's introduction, matching this repo's standing convention.
name: yaml-guard

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'

env:
  ACTIONLINT_VERSION: '1.7.12'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download actionlint
        id: get_actionlint
        shell: bash
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) "$ACTIONLINT_VERSION"
      - name: Check workflow files
        shell: bash
        run: ${{ steps.get_actionlint.outputs.executable }} -color
